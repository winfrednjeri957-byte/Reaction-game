<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Reaction Speed Test</title>

<!-- CSS -->
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  margin: 0;
}

h1 {
  font-size: 2.5em;
  color: #00ffcc;
  text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
}

p {
  font-size: 1.2em;
  margin: 10px 0;
}

#gameBox {
  width: 300px;
  height: 200px;
  margin: 30px auto;
  background: red;
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 0 20px #ff0055;
  transition: 0.3s all;
}

#gameBox.green {
  background: #00ff00;
  box-shadow: 0 0 25px #00ff00;
}

button {
  padding: 12px 18px;
  font-size: 16px;
  background-color: #00ffcc;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 20px;
  font-weight: bold;
  transition: 0.3s all;
}

button:hover {
  background-color: #00ccaa;
  transform: scale(1.05);
}

#result {
  margin-top: 20px;
  font-size: 1.5em;
  font-weight: bold;
  white-space: pre-line;
}
</style>
</head>
<body>

<h1>⚡ Reaction Speed Test</h1>
<p>Wait for green... then TAP FAST!</p>

<div id="gameBox" onclick="handleClick()"></div>

<p id="result"></p>

<button onclick="copyLink()">Challenge a Friend</button>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
// ==== GLOBAL VARIABLES ====
let secretBox = document.getElementById("gameBox");
let result = document.getElementById("result");
let waiting = true;
let startTime;
let bestScore = localStorage.getItem("bestScore") || 9999;

// ==== SOUND EFFECT ====
let sound = new Audio("https://freesound.org/data/previews/146/146725_2394245-lq.mp3"); // simple beep

// ==== START GAME FUNCTION ====
function startGame() {
  secretBox.classList.remove("green");
  secretBox.style.background = "red";
  waiting = true;
  
  let randomDelay = Math.random() * 3000 + 2000; // 2-5 sec
  setTimeout(() => {
    secretBox.style.background = "green";
    secretBox.classList.add("green");
    startTime = Date.now();
    waiting = false;
    sound.play(); // plays beep when green
  }, randomDelay);
}

// ==== HANDLE CLICK ====
function handleClick() {
  if (waiting) {
    result.innerText = "🚨 Too soon! Wait for green!";
    return;
  }

  let reactionTime = Date.now() - startTime;

  if (reactionTime < bestScore) {
    bestScore = reactionTime;
    localStorage.setItem("bestScore", bestScore);
    triggerConfetti();
  }

  // ==== RANK CALCULATION ====
  let rank;
  let color;

  if (reactionTime < 200) {
    rank = "⚡ Elite Human";
    color = "#00ff00";
  } else if (reactionTime < 300) {
    rank = "🔥 Above Average";
    color = "#ffff00";
  } else if (reactionTime < 400) {
    rank = "🙂 Average";
    color = "#ff9900";
  } else {
    rank = "🐢 Slow Reflexes";
    color = "#ff3333";
  }

  result.innerHTML = 
    "⏱ Reaction: " + reactionTime + " ms<br>" +
    "🏆 Rank: <span style='color:" + color + "'>" + rank + "</span><br>" +
    "⭐ Best: " + bestScore + " ms";

  startGame();
}

// ==== CONFETTI EFFECT ====
function triggerConfetti() {
  const duration = 1.5 * 1000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 3,
      angle: 60,
      spread: 55,
      origin: { x: 0 },
    });
    confetti({
      particleCount: 3,
      angle: 120,
      spread: 55,
      origin: { x: 1 },
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
}

// ==== SHARE BUTTON FUNCTION ====
function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied! Send it to your friends and challenge them 😈");
}

// ==== INITIALIZE ====
startGame();
</script>
</body>
</html>
